<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>郡山駅 バス時刻表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* Shared timetable visual direction, matched with the Shinkansen app. */
:root {
  --ink: #0d0d0d;
  --paper: #f0ede6;
  --rail: #1a2e4a;
  --rail-mid: #243d61;
  --brand: #c85d2b;
  --brand-deep: #8e3d1d;
  --accent: #2f7b83;
  --gold: #b8a060;
  --muted: #8a8070;
  --border: #d8d3c8;
  --panel: #ffffff;
  --next-bg: #fff8e8;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --header-h: 142px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: var(--sans);
  min-height: 100dvh;
  color: var(--ink);
  background: var(--paper);
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0;
  background: var(--rail);
  color: #fff;
  backdrop-filter: none;
  box-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
  height: var(--header-h);
}

.header-top {
  display: flex;
  align-items: center;
  padding: 10px 14px 8px;
  gap: 10px;
}

.bus-icon {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--brand);
  font-size: 17px;
  flex-shrink: 0;
}

.header-title h1 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.header-title p {
  margin-top: 0;
  font-size: 9px;
  opacity: 0.6;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #fff;
}

#live-clock {
  font-family: var(--mono);
  font-size: 19px;
  font-weight: 400;
  letter-spacing: 0;
  line-height: 1;
}

#live-date {
  margin-top: 1px;
  font-size: 9px;
  opacity: 0.6;
  letter-spacing: 0.06em;
  color: #fff;
}

.clock {
  margin-left: auto;
  text-align: right;
}

.day-badge {
  display: inline-block;
  margin-top: 3px;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
}

.day-badge.weekday {
  background: rgba(200, 93, 43, 0.9);
  color: #fff;
}

.day-badge.weekend {
  background: var(--gold);
  color: var(--rail);
}

.control-group {
  margin-top: 0;
  padding: 0 14px 8px;
}

.control-title {
  display: none;
}

.toggle-row {
  display: flex;
  gap: 6px;
}

.toggle-btn {
  flex: 1;
  min-height: 0;
  padding: 6px 4px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 255, 255, 0.6);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  line-height: 1.25;
  white-space: normal;
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
  user-select: none;
}

.toggle-btn.active {
  background: rgba(255, 255, 255, 0.94);
  border-color: rgba(255, 255, 255, 0.94);
  color: var(--rail);
}

main {
  width: auto;
  margin: 0;
  padding: 0 0 80px;
}

.col-header {
  width: auto;
  margin: 0;
  display: grid;
  grid-template-columns: 100px 1fr 1fr 1fr;
  background: var(--rail-mid);
  border-bottom: 2px solid rgba(255, 255, 255, 0.08);
  position: sticky;
  top: var(--header-h);
  z-index: 90;
}

.col-label {
  padding: 7px 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.64);
  text-align: center;
}

.col-label:first-child {
  text-align: left;
  padding-left: 14px;
}

.col-label.info {
  color: #f2b694;
  border-bottom: 2px solid #f2b694;
}

.col-label.dep {
  color: #86cbd0;
  border-bottom: 2px solid #86cbd0;
}

.col-label.arr {
  color: #e89263;
  border-bottom: 2px solid #e89263;
}

.col-label.mid {
  color: #d8c4ff;
  border-bottom: 2px solid #aa87e6;
}

.col-label .en {
  display: block;
  font-size: 8px;
  opacity: 0.55;
  letter-spacing: 0.12em;
}

.bus-list {
  padding-bottom: 80px;
}

.hour-sep {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px 4px;
  position: sticky;
  top: calc(var(--header-h) + 33px);
  background: var(--paper);
  z-index: 80;
}

.hour-sep-num {
  min-width: 28px;
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 400;
  line-height: 1;
  color: var(--rail);
}

.hour-sep-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}

.trip-row {
  display: grid;
  grid-template-columns: 100px 1fr 1fr 1fr;
  gap: 0;
  align-items: stretch;
  background: var(--panel);
  border-bottom: 1px solid #e8e4db;
  min-height: 54px;
  transition: background 0.15s;
}

.trip-row:active {
  background: #f5f0e8;
}

.trip-row.next {
  background: var(--next-bg);
  border-left: 3px solid var(--brand);
}

.trip-row.past {
  opacity: 0.35;
}

.trip-row.next .trip-main {
  padding-left: 11px;
}

.trip-main {
  padding: 8px 4px 8px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.route-no {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.trip-destination {
  font-size: 11px;
  font-weight: 700;
  line-height: 1.35;
}

.trip-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 10px;
  color: var(--muted);
}

.next-chip {
  display: inline-block;
  padding: 1px 4px;
  border-radius: 3px;
  background: var(--brand);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.time-cell {
  padding: 6px 4px;
  border-left: 1px solid #ede9e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.time-label {
  padding: 1px 5px;
  border-radius: 2px;
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
}

.time-value {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
}

.time-cell.departure .time-value {
  color: var(--accent);
}

.time-cell.arrival .time-value {
  color: var(--brand);
}

.time-cell.midpoint .time-value {
  color: #7b3f9a;
}

.time-label.dep {
  background: var(--accent);
}

.time-label.arr {
  background: var(--brand);
}

.time-label.mid {
  background: #7b3f9a;
}

.empty,
.error-box {
  margin: 16px 14px 0;
  padding: 14px;
  border-radius: 0;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--brand);
  font-weight: 700;
  line-height: 1.7;
}

.fab {
  position: fixed;
  right: 20px;
  bottom: 24px;
  z-index: 200;
  width: 50px;
  height: 50px;
  border: none;
  border-radius: 50%;
  background: var(--rail);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s;
}

.fab:active {
  transform: scale(0.9);
}

.app-switch {
  position: fixed;
  left: 20px;
  bottom: 24px;
  z-index: 200;
  min-width: 112px;
  height: 50px;
  padding: 0 14px;
  border-radius: 25px;
  background: var(--rail);
  color: #fff;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-decoration: none;
}

.app-switch:active {
  transform: scale(0.96);
}

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .bus-list {
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
  }

  .fab {
    bottom: calc(24px + env(safe-area-inset-bottom));
  }

  .app-switch {
    bottom: calc(24px + env(safe-area-inset-bottom));
  }
}

@media (max-width: 760px) {
  :root {
    --header-h: 164px;
  }

  .toggle-row {
    display: flex;
    grid-template-columns: none;
    gap: 6px;
  }

  .toggle-btn {
    min-height: 32px;
    font-size: 10px;
  }

  .col-header,
  .trip-row {
    grid-template-columns: 90px 1fr 1fr 1fr;
  }

  .trip-row.next .trip-main {
    padding-left: 7px;
  }

  .trip-destination {
    font-size: 10px;
  }
}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="bus-icon">🚌</div>
    <div class="header-title">
      <h1>福島交通バス</h1>
      <p>郡山駅前 - 台新 - 静御前堂 / 郡山駅前 - 針生</p>
    </div>
    <div class="clock">
      <div id="live-clock">--:--</div>
      <div id="live-date">----.--.--</div>
      <div id="day-badge" class="day-badge weekday">平日ダイヤ</div>
    </div>
  </div>

  <div class="control-group">
    <div class="control-title">ダイヤ</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="day-weekday" onclick="setServiceDay('weekday')">平日ダイヤ</button>
      <button class="toggle-btn" id="day-weekend" onclick="setServiceDay('weekend')">休日ダイヤ</button>
    </div>
  </div>

  <div class="control-group">
    <div class="control-title">方向</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="dir-down" onclick="setDir('down')">▼ 下り（郡山駅前→バス停）</button>
      <button class="toggle-btn" id="dir-up" onclick="setDir('up')">▲ 上り（バス停→郡山駅前）</button>
    </div>
  </div>
</header>

<div class="col-header">
  <div class="col-label info">便<span class="en">DESTINATION</span></div>
  <div class="col-label dep" id="lbl-col-1">出発<span class="en">発</span></div>
  <div class="col-label mid" id="lbl-col-2">経由<span class="en">着</span></div>
  <div class="col-label arr" id="lbl-col-3">到着<span class="en">着</span></div>
</div>

<main>
  <div class="bus-list" id="trip-list"></div>
</main>

<a class="app-switch" href="../shinkansen/index.html" title="新幹線時刻表へ">🚄 新幹線</a>
<button class="fab" onclick="scrollToNext()" title="次の便へ">⏱</button>

<script>
(async function init() {
  const data = await loadBusData();
  const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
  let serviceDay = loadInitialServiceDay();
  let dir = 'down';
  let hasAutoScrolled = false;

  function loadInitialServiceDay() {
    const saved = localStorage.getItem('bus-service-day');
    if (saved === 'weekday' || saved === 'weekend') return saved;
    const today = new Date().getDay();
    return today === 0 || today === 6 ? 'weekend' : 'weekday';
  }

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    const mo = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    document.getElementById('live-clock').textContent = `${hh}:${mm}:${ss}`;
    document.getElementById('live-date').textContent = `${now.getFullYear()}.${mo}.${dd}（${DAY_NAMES[now.getDay()]}）`;
  }

  function toMinutes(value) {
    const [hh, mm] = value.split(':').map(Number);
    return hh * 60 + mm;
  }

  function getTrips() {
    const trips = Object.entries(data.routes).flatMap(([, route]) => {
      return route[serviceDay][dir].map((trip) => ({
        ...trip,
        fromStop: route.stops[dir][0],
        toStop: route.stops[dir][1],
        midpointStop: route.midpointStop,
      }));
    });

    return trips.sort((a, b) => {
      const departureDiff = toMinutes(a.departure) - toMinutes(b.departure);
      if (departureDiff !== 0) return departureDiff;
      return toMinutes(a.arrival) - toMinutes(b.arrival);
    });
  }

  function updateControls() {
    const badge = document.getElementById('day-badge');
    badge.textContent = serviceDay === 'weekend' ? '休日ダイヤ' : '平日ダイヤ';
    badge.className = `day-badge ${serviceDay === 'weekend' ? 'weekend' : 'weekday'}`;
    document.getElementById('day-weekday').className = `toggle-btn${serviceDay === 'weekday' ? ' active' : ''}`;
    document.getElementById('day-weekend').className = `toggle-btn${serviceDay === 'weekend' ? ' active' : ''}`;
    document.getElementById('dir-down').className = `toggle-btn${dir === 'down' ? ' active' : ''}`;
    document.getElementById('dir-up').className = `toggle-btn${dir === 'up' ? ' active' : ''}`;
  }

  function render() {
    updateControls();

    const trips = getTrips();
    const now = new Date();
    const nowMinutes = now.getHours() * 60 + now.getMinutes();
    let nextIndex = -1;
    let minDiff = Infinity;
    trips.forEach((trip, index) => {
      const diff = toMinutes(trip.departure) - nowMinutes;
      if (diff >= 0 && diff < minDiff) {
        minDiff = diff;
        nextIndex = index;
      }
    });

    const columnTags = dir === 'down' ? ['発', '着', '着'] : ['発', '発', '着'];
    document.getElementById('lbl-col-1').innerHTML =
      `${dir === 'down' ? '郡山駅前' : '静御前堂'}<span class="en">${columnTags[0]}</span>`;
    document.getElementById('lbl-col-2').innerHTML =
      `${dir === 'down' ? '台新 / 針生' : '台新 / 針生'}<span class="en">${columnTags[1]}</span>`;
    document.getElementById('lbl-col-3').innerHTML =
      `${dir === 'down' ? '静御前堂' : '郡山駅前'}<span class="en">${columnTags[2]}</span>`;

    const list = document.getElementById('trip-list');
    if (!trips.length) {
      list.innerHTML = '<div class="empty">この条件の便は見つかりませんでした。</div>';
      return;
    }

    const groups = {};
    trips.forEach((trip, index) => {
      const hour = trip.departure.split(':')[0];
      if (!groups[hour]) groups[hour] = [];
      groups[hour].push({ trip, index });
    });

    let html = '';
    Object.keys(groups).sort((a, b) => Number(a) - Number(b)).forEach((hour) => {
      html += `<div class="hour-sep"><div class="hour-sep-num">${hour}</div><div class="hour-sep-line"></div></div>`;
      groups[hour].forEach(({ trip, index }) => {
        const isPast = toMinutes(trip.departure) < nowMinutes;
        const isNext = index === nextIndex;
        const firstStopLabel = dir === 'down' ? trip.fromStop : (trip.midpointStop || '');
        const firstStopTime = dir === 'down' ? trip.departure : (trip.midpoint_time || '');
        const secondStopLabel = dir === 'down' ? trip.toStop : trip.fromStop;
        const secondStopTime = dir === 'down' ? trip.arrival : trip.departure;
        const thirdStopLabel = dir === 'down' ? (trip.midpointStop || '') : trip.toStop;
        const thirdStopTime = dir === 'down' ? (trip.midpoint_time || '') : trip.arrival;
        html += `
          <section class="trip-row${isPast ? ' past' : ''}${isNext ? ' next' : ''}">
            <div class="trip-main">
              <span class="route-no">${trip.route_no}</span>
              <div class="trip-destination">${trip.destination}</div>
              <div class="trip-meta">${isNext ? '<span class="next-chip">次発</span>' : ''}<span>のりば ${trip.platform}</span></div>
            </div>
            <div class="time-cell departure">
              <div class="time-label dep">${firstStopLabel}</div>
              <div class="time-value">${firstStopTime}</div>
            </div>
            <div class="time-cell midpoint">
              <div class="time-label mid">${secondStopLabel}</div>
              <div class="time-value">${secondStopTime}</div>
            </div>
            <div class="time-cell arrival">
              <div class="time-label arr">${thirdStopLabel}</div>
              <div class="time-value">${thirdStopTime}</div>
            </div>
          </section>
        `;
      });
    });

    list.innerHTML = html;
    if (!hasAutoScrolled) {
      hasAutoScrolled = true;
      setTimeout(scrollToNextTrip, 0);
    }
  }

  window.setServiceDay = function setServiceDay(nextDay) {
    serviceDay = nextDay;
    localStorage.setItem('bus-service-day', serviceDay);
    render();
  };

  window.setDir = function setDir(nextDir) {
    dir = nextDir;
    render();
  };

  window.scrollToNext = function scrollToNext() {
    scrollToNextTrip();
  };

  function scrollToNextTrip() {
    const el = document.querySelector('.trip-row.next');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  setInterval(updateClock, 1000);
  updateClock();
  render();
})().catch(showDataLoadError);

function loadBusData() {
  if (window.BUS_TIMETABLE_DATA) {
    return Promise.resolve(window.BUS_TIMETABLE_DATA);
  }

  const version = '20260423';
  const candidates = [
    `../../data/bus/timetable-data.js?v=${version}`,
    `../data/bus/timetable-data.js?v=${version}`,
    `./data/bus/timetable-data.js?v=${version}`,
    `data/bus/timetable-data.js?v=${version}`
  ];

  return [...new Set(candidates)].reduce((promise, src) => {
    return promise.catch(() => loadScript(src));
  }, Promise.reject(new Error('Initial load attempt')));
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.onload = () => {
      if (window.BUS_TIMETABLE_DATA) resolve(window.BUS_TIMETABLE_DATA);
      else reject(new Error(`Loaded ${src} but bus timetable data was undefined`));
    };
    script.onerror = () => reject(new Error(`Failed to load ${src}`));
    document.head.appendChild(script);
  });
}

function showDataLoadError(error) {
  const list = document.getElementById('trip-list');
  list.innerHTML = '<div class="error-box">Data load error: data/bus/timetable-data.js was not loaded.</div>';
  console.error(error);
}
</script>
</body>
</html>
