<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>郡山駅 バス時刻表</title>
<style>
:root {
  --ink: #16202b;
  --paper: #f4efe6;
  --panel: #fffdfa;
  --line: #ddd4c2;
  --brand: #bf5a2d;
  --brand-deep: #803716;
  --accent: #2f7b83;
  --accent-soft: #d9eeef;
  --muted: #786d60;
  --header-h: 220px;
  --next-bg: #fff4ea;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
  min-height: 100dvh;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(191, 90, 45, 0.18), transparent 26%),
    linear-gradient(180deg, #efe2cf 0%, var(--paper) 42%, #fbf8f2 100%);
}

header {
  position: sticky;
  top: 0;
  z-index: 30;
  padding: 14px 14px 10px;
  background: rgba(22, 32, 43, 0.96);
  color: #fff;
  backdrop-filter: blur(16px);
  box-shadow: 0 8px 26px rgba(0, 0, 0, 0.25);
  height: var(--header-h);
}

.header-top {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bus-icon {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
  font-size: 18px;
  flex-shrink: 0;
}

.header-title h1 {
  font-size: 16px;
  letter-spacing: 0.04em;
}

.header-title p {
  margin-top: 2px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.72);
}

.clock {
  margin-left: auto;
  text-align: right;
}

#live-clock {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

#live-date {
  margin-top: 3px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.7);
}

.control-group {
  margin-top: 12px;
}

.control-title {
  margin-bottom: 6px;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: rgba(255, 255, 255, 0.56);
}

.toggle-row {
  display: flex;
  gap: 8px;
}

.toggle-btn {
  flex: 1;
  min-height: 38px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.07);
  color: rgba(255, 255, 255, 0.66);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

.toggle-btn.active {
  background: #fff;
  color: var(--ink);
  border-color: #fff;
}

main {
  width: min(980px, calc(100% - 24px));
  margin: 0 auto;
  padding: 0 0 80px;
}

.col-header {
  width: min(980px, calc(100% - 24px));
  margin: 0 auto;
  display: grid;
  grid-template-columns: 114px 1fr 1fr;
  background: rgba(41, 57, 77, 0.98);
  border-bottom: 2px solid rgba(255, 255, 255, 0.08);
  position: sticky;
  top: var(--header-h);
  z-index: 25;
}

.col-label {
  padding: 7px 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: rgba(255, 255, 255, 0.64);
  text-align: center;
}

.col-label:first-child {
  text-align: left;
  padding-left: 14px;
}

.col-label.info {
  color: #ffd2ba;
  border-bottom: 2px solid #ffd2ba;
}

.col-label.dep {
  color: #a7dbe0;
  border-bottom: 2px solid #7fb9c1;
}

.col-label.arr {
  color: #ffb485;
  border-bottom: 2px solid #ff9a5b;
}

.col-label .en {
  display: block;
  font-size: 8px;
  opacity: 0.55;
  letter-spacing: 0.12em;
}

.bus-list {
  padding-bottom: 80px;
}

.hour-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px 4px;
  position: sticky;
  top: calc(var(--header-h) + 33px);
  background: var(--paper);
  z-index: 20;
}

.hour-sep-num {
  min-width: 42px;
  font-size: 24px;
  font-weight: 700;
  color: var(--brand-deep);
}

.hour-sep-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(128, 55, 22, 0.35), rgba(128, 55, 22, 0.04));
}

.trip-row {
  display: grid;
  grid-template-columns: 114px 1fr 1fr;
  gap: 0;
  align-items: stretch;
  background: var(--panel);
  border-bottom: 1px solid #e7dfd1;
  min-height: 58px;
}

.trip-row.next {
  background: var(--next-bg);
  border-left: 3px solid var(--brand);
}

.trip-row.past {
  opacity: 0.46;
}

.trip-main {
  padding: 8px 4px 8px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.route-no {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  padding: 2px 6px;
  border-radius: 3px;
  background: rgba(47, 123, 131, 0.12);
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.trip-destination {
  font-size: 12px;
  font-weight: 700;
  line-height: 1.4;
}

.trip-meta {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.next-chip {
  display: inline-block;
  padding: 1px 4px;
  border-radius: 3px;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.time-cell {
  padding: 6px 4px;
  border-left: 1px solid #ece4d7;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.time-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: #fff;
  padding: 1px 5px;
  border-radius: 2px;
}

.time-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}

.time-cell.departure .time-value {
  color: var(--accent);
}

.time-cell.arrival .time-value {
  color: var(--brand-deep);
}

.time-label.dep {
  background: var(--accent);
}

.time-label.arr {
  background: var(--brand);
}

.empty,
.error-box {
  margin-top: 16px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid rgba(191, 90, 45, 0.18);
  line-height: 1.7;
}

.fab {
  position: fixed;
  right: 18px;
  bottom: 20px;
  z-index: 40;
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 12px 24px rgba(128, 55, 22, 0.28);
}

@media (max-width: 760px) {
  :root { --header-h: 224px; }
  .col-header,
  .trip-row {
    grid-template-columns: 1fr;
  }
  .col-header {
    top: var(--header-h);
  }
  .col-label:first-child {
    text-align: center;
    padding-left: 4px;
  }
  .time-cell {
    border-left: none;
    border-top: 1px solid #ece4d7;
    flex-direction: row;
    justify-content: space-between;
    padding: 12px 14px;
  }
}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="bus-icon">🚌</div>
    <div class="header-title">
      <h1>郡山駅 バス時刻表</h1>
      <p>到着時刻ベースで比較できる一覧</p>
    </div>
    <div class="clock">
      <div id="live-clock">--:--</div>
      <div id="live-date">----.--.--</div>
    </div>
  </div>

  <div class="control-group">
    <div class="control-title">区間</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="route-taishin" onclick="setRoute('taishin')">郡山駅前 ⇄ 台新</button>
      <button class="toggle-btn" id="route-haribu" onclick="setRoute('haribu')">郡山駅前 ⇄ 針生</button>
    </div>
  </div>

  <div class="control-group">
    <div class="control-title">ダイヤ</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="day-weekday" onclick="setServiceDay('weekday')">平日</button>
      <button class="toggle-btn" id="day-weekend" onclick="setServiceDay('weekend')">休日</button>
    </div>
  </div>

  <div class="control-group">
    <div class="control-title">方向</div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="dir-down" onclick="setDir('down')">郡山駅前 → バス停</button>
      <button class="toggle-btn" id="dir-up" onclick="setDir('up')">バス停 → 郡山駅前</button>
    </div>
  </div>
</header>

<div class="col-header">
  <div class="col-label info">便<span class="en">DESTINATION</span></div>
  <div class="col-label dep" id="lbl-departure">出発<span class="en">DEPART</span></div>
  <div class="col-label arr" id="lbl-arrival">到着<span class="en">ARRIVE</span></div>
</div>

<main>
  <div class="bus-list" id="trip-list"></div>
</main>

<button class="fab" onclick="scrollToNext()" title="次の便へ">⏱</button>

<script>
(async function init() {
  const data = await loadBusData();
  const DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
  let routeKey = 'taishin';
  let serviceDay = loadInitialServiceDay();
  let dir = 'down';

  function loadInitialServiceDay() {
    const saved = localStorage.getItem('bus-service-day');
    if (saved === 'weekday' || saved === 'weekend') return saved;
    const today = new Date().getDay();
    return today === 0 || today === 6 ? 'weekend' : 'weekday';
  }

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const mo = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    document.getElementById('live-clock').textContent = `${hh}:${mm}`;
    document.getElementById('live-date').textContent = `${now.getFullYear()}.${mo}.${dd}（${DAY_NAMES[now.getDay()]}）`;
  }

  function toMinutes(value) {
    const [hh, mm] = value.split(':').map(Number);
    return hh * 60 + mm;
  }

  function getTrips() {
    return data.routes[routeKey][serviceDay][dir];
  }

  function updateControls() {
    document.getElementById('route-taishin').className = `toggle-btn${routeKey === 'taishin' ? ' active' : ''}`;
    document.getElementById('route-haribu').className = `toggle-btn${routeKey === 'haribu' ? ' active' : ''}`;
    document.getElementById('day-weekday').className = `toggle-btn${serviceDay === 'weekday' ? ' active' : ''}`;
    document.getElementById('day-weekend').className = `toggle-btn${serviceDay === 'weekend' ? ' active' : ''}`;
    document.getElementById('dir-down').className = `toggle-btn${dir === 'down' ? ' active' : ''}`;
    document.getElementById('dir-up').className = `toggle-btn${dir === 'up' ? ' active' : ''}`;
  }

  function render() {
    updateControls();

    const route = data.routes[routeKey];
    const [fromStop, toStop] = route.stops[dir];
    const trips = getTrips();
    const now = new Date();
    const nowMinutes = now.getHours() * 60 + now.getMinutes();
    let nextIndex = -1;
    let minDiff = Infinity;
    trips.forEach((trip, index) => {
      const diff = toMinutes(trip.arrival) - nowMinutes;
      if (diff >= 0 && diff < minDiff) {
        minDiff = diff;
        nextIndex = index;
      }
    });

    document.getElementById('lbl-departure').innerHTML = `${fromStop}<span class="en">DEPART</span>`;
    document.getElementById('lbl-arrival').innerHTML = `${toStop}<span class="en">ARRIVE</span>`;

    const list = document.getElementById('trip-list');
    if (!trips.length) {
      list.innerHTML = '<div class="empty">この条件の便は見つかりませんでした。</div>';
      return;
    }

    const groups = {};
    trips.forEach((trip, index) => {
      const hour = trip.arrival.split(':')[0];
      if (!groups[hour]) groups[hour] = [];
      groups[hour].push({ trip, index });
    });

    let html = '';
    Object.keys(groups).sort((a, b) => Number(a) - Number(b)).forEach((hour) => {
      html += `<div class="hour-sep"><div class="hour-sep-num">${hour}</div><div class="hour-sep-line"></div></div>`;
      groups[hour].forEach(({ trip, index }) => {
        const isPast = toMinutes(trip.arrival) < nowMinutes;
        const isNext = index === nextIndex;
        html += `
          <section class="trip-row${isPast ? ' past' : ''}${isNext ? ' next' : ''}">
            <div class="trip-main">
              <span class="route-no">${trip.route_no}</span>
              <div class="trip-destination">${trip.destination}</div>
              <div class="trip-meta">${isNext ? '<span class="next-chip">次着</span>' : ''}<span>のりば ${trip.platform}</span></div>
            </div>
            <div class="time-cell departure">
              <div class="time-label dep">発</div>
              <div class="time-value">${trip.departure}</div>
            </div>
            <div class="time-cell arrival">
              <div class="time-label arr">着</div>
              <div class="time-value">${trip.arrival}</div>
            </div>
          </section>
        `;
      });
    });

    list.innerHTML = html;
  }

  window.setRoute = function setRoute(nextRoute) {
    routeKey = nextRoute;
    render();
  };

  window.setServiceDay = function setServiceDay(nextDay) {
    serviceDay = nextDay;
    localStorage.setItem('bus-service-day', serviceDay);
    render();
  };

  window.setDir = function setDir(nextDir) {
    dir = nextDir;
    render();
  };

  window.scrollToNext = function scrollToNext() {
    const el = document.querySelector('.trip-row.next');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  };

  setInterval(updateClock, 1000);
  updateClock();
  render();
})().catch(showDataLoadError);

function loadBusData() {
  if (window.BUS_TIMETABLE_DATA) {
    return Promise.resolve(window.BUS_TIMETABLE_DATA);
  }

  const version = '20260423';
  const candidates = [
    `../../data/bus/timetable-data.js?v=${version}`,
    `../data/bus/timetable-data.js?v=${version}`,
    `./data/bus/timetable-data.js?v=${version}`,
    `data/bus/timetable-data.js?v=${version}`
  ];

  return [...new Set(candidates)].reduce((promise, src) => {
    return promise.catch(() => loadScript(src));
  }, Promise.reject(new Error('Initial load attempt')));
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = src;
    script.onload = () => {
      if (window.BUS_TIMETABLE_DATA) resolve(window.BUS_TIMETABLE_DATA);
      else reject(new Error(`Loaded ${src} but bus timetable data was undefined`));
    };
    script.onerror = () => reject(new Error(`Failed to load ${src}`));
    document.head.appendChild(script);
  });
}

function showDataLoadError(error) {
  const list = document.getElementById('trip-list');
  list.innerHTML = '<div class="error-box">Data load error: data/bus/timetable-data.js was not loaded.</div>';
  console.error(error);
}
</script>
</body>
</html>
