<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>東北新幹線 時刻表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0d0d;
  --paper: #f0ede6;
  --rail: #1a2e4a;
  --rail-mid: #243d61;
  --accent: #c8312b;
  --gold: #b8a060;
  --muted: #8a8070;
  --border: #d8d3c8;
  --card: #ffffff;
  --next-bg: #fff8e8;
  --col-tokyo: #1a5c9a;
  --col-ueno: #2e7d52;
  --col-koriyama: #7b3f9a;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --header-h: 108px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100dvh; }

/* HEADER */
header {
  background: var(--rail);
  color: #fff;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,.4);
  height: var(--header-h);
}
.header-top { display:flex; align-items:center; padding:10px 14px 8px; gap:10px; }
.train-icon {
  width:30px; height:30px; background:var(--accent); border-radius:6px;
  display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;
}
.header-title h1 { font-size:14px; font-weight:700; letter-spacing:.08em; }
.header-title .sub { font-size:9px; opacity:.6; letter-spacing:.14em; text-transform:uppercase; }
.clock-block { margin-left:auto; text-align:right; }
#live-clock { font-family:var(--mono); font-size:19px; line-height:1; }
#live-date { font-size:9px; opacity:.6; letter-spacing:.06em; margin-top:1px; }
.day-badge {
  display:inline-block; font-size:9px; font-weight:700;
  letter-spacing:.1em; padding:1px 6px; border-radius:3px; margin-top:3px;
}
.day-badge.weekday { background:rgba(200,49,43,.9); color:#fff; }
.day-badge.weekend { background:var(--gold); color:var(--rail); }

/* Direction bar */
.dir-bar { display:flex; padding:0 14px 8px; gap:6px; }
.dir-btn {
  flex:1; padding:6px 0; font-size:11px; font-weight:600;
  font-family:var(--sans); letter-spacing:.06em; border:none;
  border-radius:6px; cursor:pointer;
  background:rgba(255,255,255,.12); color:rgba(255,255,255,.55);
  transition:background .18s,color .18s; user-select:none;
}
.dir-btn.active { background:var(--accent); color:#fff; }

/* Column headers */
.col-header {
  display:grid; grid-template-columns:100px 1fr 1fr 1fr;
  background:var(--rail-mid);
  border-bottom:2px solid rgba(255,255,255,.08);
  position:sticky; top:var(--header-h); z-index:90;
}
.col-label {
  padding:7px 4px; font-size:10px; font-weight:700;
  letter-spacing:.1em; color:rgba(255,255,255,.6); text-align:center;
}
.col-label:first-child { text-align:left; padding-left:14px; }
.col-label.tokyo    { color:#7ab8f5; border-bottom:2px solid #7ab8f5; }
.col-label.ueno     { color:#7ec89a; border-bottom:2px solid #7ec89a; }
.col-label.koriyama { color:#c09ae0; border-bottom:2px solid #c09ae0; }
.col-label .en { display:block; font-size:8px; opacity:.55; letter-spacing:.12em; }

/* Train list */
.train-list { padding-bottom:80px; }

/* Hour separator */
.hour-sep {
  display:flex; align-items:center; gap:8px; padding:8px 14px 4px;
  position:sticky; top:calc(var(--header-h) + 33px);
  background:var(--paper); z-index:80;
}
.hour-sep-num { font-family:var(--mono); font-size:20px; color:var(--rail); min-width:28px; line-height:1; }
.hour-sep-line { flex:1; height:1px; background:var(--border); }

/* Train row */
.train-row {
  display:grid; grid-template-columns:100px 1fr 1fr 1fr;
  align-items:stretch;
  border-bottom:1px solid #e8e4db;
  background:var(--card);
  transition:background .15s;
  min-height:54px;
}
.train-row:active { background:#f5f0e8; }
.train-row.past { opacity:.35; }
.train-row.next {
  background:var(--next-bg);
  border-left:3px solid var(--accent);
}

/* Left: badge info */
.cell-info {
  padding:8px 4px 8px 14px;
  display:flex; flex-direction:column; justify-content:center; gap:3px;
}
.train-row.next .cell-info { padding-left:11px; }
.train-badge {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; font-weight:700; padding:2px 6px;
  border-radius:3px; letter-spacing:.06em; width:fit-content;
}
.badge-hayate   { background:#1a6b3a; color:#fff; }
.badge-yamabiko { background:#0f4d8c; color:#fff; }
.badge-nasu     { background:#7b3f9a; color:#fff; }
.train-meta { display:flex; align-items:center; gap:4px; }
.train-num { font-size:10px; color:var(--muted); font-family:var(--mono); }
.next-label {
  font-size:8px; background:var(--accent); color:#fff;
  padding:1px 4px; border-radius:3px; font-weight:700; letter-spacing:.08em;
}
.origin-label {
  font-size:8px; background:var(--col-koriyama); color:#fff;
  padding:1px 4px; border-radius:3px; font-weight:700; letter-spacing:.08em;
}

/* Time cells */
.cell-time {
  padding:6px 4px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-left:1px solid #ede9e0;
  gap:2px;
}
.time-big { font-family:var(--mono); font-size:18px; line-height:1; }
.time-big .hh { font-size:18px; color:inherit; }
.time-tag {
  font-size:8px; font-weight:700; letter-spacing:.1em;
  padding:1px 5px; border-radius:2px; color:#fff;
}
.cell-time.tokyo    .time-big { color:var(--col-tokyo); }
.cell-time.ueno     .time-big { color:var(--col-ueno); }
.cell-time.koriyama .time-big { color:var(--col-koriyama); }
.tag-dep-tokyo    { background:var(--col-tokyo); }
.tag-dep-ueno     { background:var(--col-ueno); }
.tag-dep-koriyama { background:var(--col-koriyama); }
.tag-arr-tokyo    { background:#0d3d6b; }
.tag-arr-koriyama { background:#4e2070; }

/* FAB */
.fab {
  position:fixed; bottom:24px; right:20px; z-index:200;
  width:50px; height:50px; background:var(--rail); color:#fff;
  border:none; border-radius:50%; font-size:20px; cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  display:flex; align-items:center; justify-content:center;
  transition:transform .15s;
}
.fab:active { transform:scale(.9); }

@supports (padding-bottom:env(safe-area-inset-bottom)) {
  .train-list { padding-bottom:calc(80px + env(safe-area-inset-bottom)); }
  .fab { bottom:calc(24px + env(safe-area-inset-bottom)); }
}
</style>
</head>

  <div class="header-top">
    <div class="train-icon">🚄</div>
    <div class="header-title">

  { id:'280', type:'yamabiko', name:'やまびこ', dest:'東京',  times:['21:17','22:38','22:45'] },
];
const UP_WEEKEND = UP_WEEKDAY;

// ┌─────────────────────────────────────────────────────────────────────────┐
// │  ★★★ 時刻表データ ここまで ★★★                                          │
// └─────────────────────────────────────────────────────────────────────────┘

// ── State ────────────────────────────────────────────────
let dir = 'down';

// ── Clock ────────────────────────────────────────────────
const DAY_NAMES = ['日','月','火','水','木','金','土'];
function isWeekend(d) { const w=d.getDay(); return w===0||w===6; }

function updateClock() {
  const now = new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('live-clock').textContent = `${h}:${m}:${s}`;
  const y=now.getFullYear(), mo=String(now.getMonth()+1).padStart(2,'0'),
        dd=String(now.getDate()).padStart(2,'0'), dn=DAY_NAMES[now.getDay()];
  document.getElementById('live-date').textContent = `${y}.${mo}.${dd}（${dn}）`;
  const b=document.getElementById('day-badge');
  if (isWeekend(now)) { b.textContent='土日祝'; b.className='day-badge weekend'; }
  else { b.textContent='平日'; b.className='day-badge weekday'; }
}
setInterval(updateClock, 1000);
updateClock();

// ── Helpers ──────────────────────────────────────────────
function toMins(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowMins() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }

// ── Render ────────────────────────────────────────────────
function render() {
  document.getElementById('btn-down').className = 'dir-btn'+(dir==='down'?' active':'');
  document.getElementById('btn-up').className   = 'dir-btn'+(dir==='up'  ?' active':'');

  // Column header labels
  const lblDefs = dir === 'down'
    ? [ {cls:'tokyo',    label:'東京', sub:'発'},
        {cls:'ueno',     label:'上野', sub:'発'},
        {cls:'koriyama', label:'郡山', sub:'着'} ]
    : [ {cls:'koriyama', label:'郡山', sub:'発'},
        {cls:'ueno',     label:'上野', sub:'発'},
        {cls:'tokyo',    label:'東京', sub:'着'} ];

  lblDefs.forEach((d, i) => {
    const el = document.getElementById('lbl-'+i);
    el.className = `col-label ${d.cls}`;
    el.innerHTML = `${d.label}<span class="en">${d.sub}</span>`;
  });

  const weekend = isWeekend(new Date());
  const nm = nowMins();
  const trains = dir==='down'
    ? (weekend ? DOWN_WEEKEND : DOWN_WEEKDAY)
    : (weekend ? UP_WEEKEND   : UP_WEEKDAY);

  // Next train = first where times[0] >= now
  let nextId=null, minDiff=Infinity;
  trains.forEach(t => {
    const diff = toMins(t.times[0]) - nm;
    if (diff>=0 && diff<minDiff) { minDiff=diff; nextId=t.id; }
  });

  // Group by departure hour (times[0])
  const groups = {};
  trains.forEach(t => {
    const hour = t.times[0].split(':')[0];
    if (!groups[hour]) groups[hour] = [];
    groups[hour].push(t);
  });

  const list = document.getElementById('train-list');
  let html = '';

  Object.keys(groups).sort((a,b)=>+a-+b).forEach(hour => {
    html += `<div class="hour-sep">
      <span class="hour-sep-num">${hour}</span>
      <div class="hour-sep-line"></div>
    </div>`;

    groups[hour].forEach(t => {
      const isPast = toMins(t.times[0]) < nm;
      const isNext = t.id === nextId;
      let cls = 'train-row';
      if (isPast) cls += ' past';
      if (isNext) cls += ' next';

      const [t0,t1,t2] = t.times;
      const [hh0,mm0] = t0.split(':');
      const [hh1,mm1] = t1.split(':');
      const [hh2,mm2] = t2.split(':');

      // Column color classes
      const c0 = dir==='down' ? 'tokyo'    : 'koriyama';
      const c2 = dir==='down' ? 'koriyama' : 'tokyo';

      // Tag classes: col0,1 = departure, col2 = arrival
      const tag0 = `tag-dep-${c0}`;
      const tag1 = `tag-dep-ueno`;
      const tag2 = dir==='down' ? 'tag-arr-koriyama' : 'tag-arr-tokyo';

      html += `<div class="${cls}">
        <div class="cell-info">
          <span class="train-badge badge-${t.type}">${t.name}</span>
          <div class="train-meta">
            <span class="train-num">${t.id}号</span>
            ${isNext ? '<span class="next-label">次発</span>' : ''}
            ${dir==='up' && t.origin==='koriyama' ? '<span class="origin-label">郡山始発</span>' : ''}
          </div>
        </div>
        <div class="cell-time ${c0}">
          <div class="time-big"><span class="hh">${hh0}:</span>${mm0}</div>
          <div class="time-tag ${tag0}">発</div>
        </div>
        <div class="cell-time ueno">
          <div class="time-big"><span class="hh">${hh1}:</span>${mm1}</div>
          <div class="time-tag ${tag1}">発</div>
        </div>
        <div class="cell-time ${c2}">
          <div class="time-big"><span class="hh">${hh2}:</span>${mm2}</div>
          <div class="time-tag ${tag2}">着</div>
        </div>
      </div>`;
    });
  });

  list.innerHTML = html;
  scrollToNow();
}

function setDir(d) { dir=d; render(); }

function scrollToNow() {
  const el = document.querySelector('.train-row.next');
  if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
}

setInterval(render, 60000);
render();
</script>
</body>
</html>
